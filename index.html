<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام USUR المطور - اكتشاف ذكي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #001a33;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2c445e;
            padding: 25px;
            border-radius: 20px;
            width: 95%;
            max-width: 800px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            border: 2px solid #002349;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .pulse-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: #002349;
            color: white;
            font-size: 25px;
            cursor: pointer;
            margin: 0 auto 15px;
            flex-shrink: 0;
        }
        .active-pulse {
            background: #d9534f !important;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(217, 83, 79, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(217, 83, 79, 0); }
            100% { box-shadow: 0 0 0 0 rgba(217, 83, 79, 0); }
        }
        #translationLog {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid rgba(77, 166, 255, 0.2);
        }
        .log-entry {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-right: 4px solid #4da6ff;
            animation: fadeIn 0.4s ease;
        }
        .source-text { font-size: 1em; color: #bdc3c7; margin-bottom: 4px; }
        .target-text { font-size: 1.2em; color: #ffcc00; font-weight: bold; }
        .ltr { direction: ltr; text-align: left; }
        .rtl { direction: rtl; text-align: right; }
        .status { font-size: 13px; color: #4da6ff; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #4da6ff; text-align: center; margin-top: 0;">💠 مترجم USUR الذكي</h2>
    <div id="status" class="status">جاهز للترجمة المزدوجة...</div>
    
    <button id="recordBtn" class="pulse-btn">🎤</button>

    <div id="translationLog">
        <p style="color: #555; text-align: center;">سجل الترجمة يظهر هنا تباعاً...</p>
    </div>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const translationLog = document.getElementById('translationLog');
    const status = document.getElementById('status');

    let isListening = false;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new Recognition();

    recognition.continuous = true;
    recognition.interimResults = false;
    
    // الحل: المتصفحات تدعم لغات متعددة كقائمة في بعض الأنظمة، 
    // ولكن الأضمن هو استخدام لغة عالمية أو التبديل بناءً على السياق
    recognition.lang = 'ar-SA'; 

    recordBtn.onclick = () => {
        if (!isListening) {
            recognition.start();
            isListening = true;
            recordBtn.classList.add('active-pulse');
            status.innerText = "أسمعك الآن.. تكلم بالعربية أو الإنجليزية";
            translationLog.innerHTML = "";
        } else {
            recognition.stop();
            isListening = false;
            recordBtn.classList.remove('active-pulse');
            status.innerText = "توقف الاستماع.";
        }
    };

    recognition.onresult = async (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.trim();
        
        // منطق متطور لاكتشاف اللغة
        // نتحقق من وجود حروف إنجليزية بنسبة معينة في الجملة
        const hasEnglish = /[a-zA-Z]/.test(transcript);
        
        let langPair, speechLang, isSourceEn;

        if (hasEnglish) {
            langPair = "en|ar"; // من إنجليزي لعربي
            speechLang = "ar-SA"; // نطق الترجمة بالعربية
            isSourceEn = true;
        } else {
            langPair = "ar|en"; // من عربي لإنجليزي
            speechLang = "en-US"; // نطق الترجمة بالإنجليزية
            isSourceEn = false;
        }

        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(transcript)}&langpair=${langPair}`);
            const data = await res.json();
            let translatedText = data.responseData.translatedText;

            // منع الترجمة لنفس اللغة (إذا كانت النتيجة مطابقة للأصل)
            if (translatedText.toLowerCase() === transcript.toLowerCase()) {
                status.innerText = "جاري محاولة ترجمة بديلة...";
                return; 
            }

            addEntryToLog(transcript, translatedText, isSourceEn);

            // نطق الترجمة فوراً لتقليل الفارق الزمني (ثانية واحدة)
            setTimeout(() => {
                speak(translatedText, speechLang);
            }, 1000);

        } catch (error) {
            console.error("خطأ في الترجمة:", error);
        }
    };

    function addEntryToLog(source, target, isSourceEn) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        
        const sourceDir = isSourceEn ? 'ltr' : 'rtl';
        const targetDir = isSourceEn ? 'rtl' : 'ltr';

        entry.innerHTML = `
            <div class="source-text ${sourceDir}">${isSourceEn ? '🇺🇸' : '🇸🇦'} ${source}</div>
            <div class="target-text ${targetDir}">${isSourceEn ? '🇸🇦' : '🇺🇸'} ${target}</div>
        `;
        translationLog.appendChild(entry);
        translationLog.scrollTop = translationLog.scrollHeight;
    }

    function speak(text, lang) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        window.speechSynthesis.speak(utterance);
    }

    recognition.onend = () => { if (isListening) recognition.start(); };
</script>

</body>
</html>
