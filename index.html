<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام USUR المطور - التبديل الذكي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #001a33;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2c445e;
            padding: 25px;
            border-radius: 20px;
            width: 95%;
            max-width: 800px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            border: 2px solid #002349;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* مفتاح التبديل الجديد */
        .lang-switch {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        .switch-label {
            padding: 8px 15px;
            border-radius: 20px;
            background: #002349;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            border: 2px solid transparent;
        }
        .switch-label.active {
            background: #4da6ff;
            color: #001a33;
            border-color: #ffffff;
        }

        .pulse-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: #002349;
            color: white;
            font-size: 25px;
            cursor: pointer;
            margin: 0 auto 15px;
            flex-shrink: 0;
            transition: 0.3s;
        }
        .active-pulse {
            background: #d9534f !important;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(217, 83, 79, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(217, 83, 79, 0); }
            100% { box-shadow: 0 0 0 0 rgba(217, 83, 79, 0); }
        }
        #translationLog {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid rgba(77, 166, 255, 0.2);
        }
        .log-entry {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-right: 4px solid #4da6ff;
            animation: fadeIn 0.4s ease;
        }
        .source-text { font-size: 1em; color: #bdc3c7; margin-bottom: 4px; }
        .target-text { font-size: 1.2em; color: #ffcc00; font-weight: bold; }
        .ltr { direction: ltr; text-align: left; }
        .rtl { direction: rtl; text-align: right; }
        .status { font-size: 13px; color: #4da6ff; margin-bottom: 10px; text-align: center; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #4da6ff; text-align: center; margin-top: 0;">💠 مترجم USUR الذكي</h2>
    
    <div class="lang-switch">
        <div id="btnAr" class="switch-label active" onclick="setLang('ar-SA')">تكلم بالعربية 🇸🇦</div>
        <div id="btnEn" class="switch-label" onclick="setLang('en-US')">Speak English 🇺🇸</div>
    </div>

    <div id="status" class="status">جاهز للترجمة.. اختر لغتك وتحدث</div>
    
    <button id="recordBtn" class="pulse-btn">🎤</button>

    <div id="translationLog">
        <p style="color: #888; text-align: center;">سجل الترجمة يظهر هنا...</p>
    </div>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const translationLog = document.getElementById('translationLog');
    const status = document.getElementById('status');
    const btnAr = document.getElementById('btnAr');
    const btnEn = document.getElementById('btnEn');

    let isListening = false;
    let currentInputLang = 'ar-SA'; // اللغة الافتراضية

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new Recognition();

    recognition.continuous = true;
    recognition.interimResults = false;

    // دالة تغيير اللغة
    function setLang(lang) {
        currentInputLang = lang;
        recognition.lang = lang;
        
        // تحديث شكل الأزرار
        if(lang === 'ar-SA') {
            btnAr.classList.add('active');
            btnEn.classList.remove('active');
            status.innerText = "تم ضبط المدخلات على العربية";
        } else {
            btnEn.classList.add('active');
            btnAr.classList.remove('active');
            status.innerText = "Input set to English";
        }

        // إذا كان التسجيل شغالاً، نقوم بإعادة تشغيله لتطبيق اللغة الجديدة
        if (isListening) {
            recognition.stop();
            setTimeout(() => recognition.start(), 300);
        }
    }

    // الضبط الأولي
    recognition.lang = currentInputLang;

    recordBtn.onclick = () => {
        if (!isListening) {
            recognition.start();
            isListening = true;
            recordBtn.classList.add('active-pulse');
            status.innerText = currentInputLang === 'ar-SA' ? "أسمعك الآن..." : "Listening...";
        } else {
            recognition.stop();
            isListening = false;
            recordBtn.classList.remove('active-pulse');
            status.innerText = "توقف الاستماع.";
        }
    };

    recognition.onresult = async (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.trim();
        
        let langPair, speechOutputLang, isSourceEn;

        // تحديد مسار الترجمة بناءً على اللغة المختارة حالياً
        if (currentInputLang === 'ar-SA') {
            langPair = "ar|en";
            speechOutputLang = "en-US";
            isSourceEn = false;
        } else {
            langPair = "en|ar";
            speechOutputLang = "ar-SA";
            isSourceEn = true;
        }

        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(transcript)}&langpair=${langPair}`);
            const data = await res.json();
            let translatedText = data.responseData.translatedText;

            // إذا فشلت الترجمة أو أعاد نفس النص
            if (translatedText.toLowerCase() === transcript.toLowerCase() && !isSourceEn) {
                return; 
            }

            // مسح رسالة الترحيب عند أول نتيجة
            if(translationLog.querySelector('p')) translationLog.innerHTML = "";

            addEntryToLog(transcript, translatedText, isSourceEn);
            speak(translatedText, speechOutputLang);

        } catch (error) {
            console.error("خطأ في الترجمة:", error);
        }
    };

    function addEntryToLog(source, target, isSourceEn) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        
        const sourceDir = isSourceEn ? 'ltr' : 'rtl';
        const targetDir = isSourceEn ? 'rtl' : 'ltr';

        entry.innerHTML = `
            <div class="source-text ${sourceDir}">${isSourceEn ? '🇺🇸' : '🇸🇦'} ${source}</div>
            <div class="target-text ${targetDir}">${isSourceEn ? '🇸🇦' : '🇺🇸'} ${target}</div>
        `;
        translationLog.prepend(entry); // الإضافة في الأعلى لسهولة الرؤية
        translationLog.scrollTop = 0;
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel(); // إلغاء أي نطق سابق لتجنب التداخل
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 0.9; // سرعة هادئة قليلاً للوضوح
        window.speechSynthesis.speak(utterance);
    }

    recognition.onend = () => { if (isListening) recognition.start(); };
</script>

</body>
</html>
